services:
  api:
    build: .
    volumes:
      - ./resources:/clarityai/resources
      - ./:/clarityai
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HF_ACCESS_TOKEN=${HF_ACCESS_TOKEN}
      - DB_URL=${DB_URL}
    depends_on:
      - relational_db
      - vector_db

  relational_db:
    image: postgres:17-alpine
    volumes:
      - relational_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${PG_DB}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}

  vector_db:
    image: qdrant/qdrant:latest
    volumes:
      - vector_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

volumes:
  relational_data:
  vector_data:
